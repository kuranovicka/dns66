name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug 2>&1 | tee build_output.txt
        continue-on-error: true
        id: build_step

      - name: Show real error if build failed
        if: steps.build_step.outcome == 'failure'
        run: |
          echo "::group::Full build output"
          cat build_output.txt
          echo "::endgroup::"
          grep -E "error:|FAILED|Exception|error " build_output.txt | head -20 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Upload APK
        if: steps.build_step.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ZbogomReklame-debug-apk
          path: app/build/outputs/apk/debug/*.apk
